<button type="button" class="btn btn-primary" data-toggle="modal" data-target="#exampleModal" data-whatever="@mdo">Post a link</button>

<div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Post a New Link</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="modal-body">
        {{ wtf.quick_form(form, extra_classes='my-form', id='yourForm') }}
      </div>

    </div>
  </div>
</div>

<script>
  $(document).ready(function() {
    // Bind to the submit event of the form
    $('#yourForm').submit(function(event) {
      // Prevent the default form submission
      event.preventDefault();
  
      // Submit the form using AJAX
      $.ajax({
        type: 'POST',
        url: '/feed',  // Replace with the actual endpoint
        data: $(this).serialize(),
        success: function(data) {
          // Handle success (e.g., close the modal)
          $('#exampleModal').modal('hide');
        },
        error: function(data) {
          // Handle errors (e.g., show validation errors)
          // You might need to adjust this part based on the structure of your response
          $('#yourForm .modal-body').html(data.responseText);
  
          // Keep the modal open
          $('#exampleModal').modal('show');
        }
      });
    });
  });
  </script>
