<button type="button" class="green-button" data-toggle="modal" data-target="#postPopup" data-whatever="@mdo">Post a link</button>

<div class="modal fade" id="postPopup" tabindex="-1" role="dialog" aria-labelledby="postPopupLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header d-flex justify-content-between align-items-center">
                <h5 class="modal-title" id="postPopupLabel">Post a New Link</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>

            <div class="modal-body">
                <form method="POST" action="" class="my-form" id="yourForm">
                    {{ form.hidden_tag() }}
                    
                    <div class="form-group">
                        <label for="post_link">Link*</label>
                        <textarea class="form-control" id="post_link" name="post_link" placeholder="e.g. https://google.com" required>{{ form.post_link.data or '' }}</textarea>
                        <div class="invalid-feedback" id="post_link_error"></div>
                    </div>
                
                    <div class="form-group">
                        <label for="post_body">Title</label>
                        <textarea class="form-control" id="post_body" name="post_body" placeholder="e.g. My Link">{{ form.post_body.data or '' }}</textarea>
                        <div class="invalid-feedback" id="post_body_error"></div>
                    </div>
                
                    <div class="form-group">
                        <label for="post_description">Description</label>
                        <textarea class="form-control" id="post_description" name="post_description" placeholder="e.g. My Description">{{ form.post_description.data or '' }}</textarea>
                        <div class="invalid-feedback" id="post_description_error"></div>
                    </div>

                    <div class="form-group">
                        <label for="post_folder">Folder</label>
                        <textarea class="form-control" id="post_folder" name="post_folder" placeholder="{{ path if path else 'e.g. myfolder/mysubfolder/etc' }}">{{ path if path else '' }}</textarea>
                        <div class="invalid-feedback" id="post_folder_error"></div>
                    </div>
                    
                
                    <div class="form-group">
                        <input type="submit" class="green-button" value="Post">
                    </div>
                </form>
                <div id="loadingSpinner" class="spinner-border text-primary" role="status" style="display: none;">
                    <span class="sr-only">Loading...</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {
        var linkPostedSuccessfully = false;
        var $loadingSpinner = $('#loadingSpinner');

        $('#yourForm').on('submit', function(e) {
            e.preventDefault();

            // Clear previous error messages and remove error class
            clearErrors();

            var isValid = true;
            var postLink = $('#post_link').val();
            var postBody = $('#post_body').val();
            var postFolder = $('#post_folder').val();

            // Validate post link
            if (!isValidUrl(postLink)) {
                showError('post_link', 'Must post valid link');
                isValid = false;
            }

            // Validate post body
            if (postBody.length > 75) {
                showError('post_body', 'Must be 75 characters or less, currently ' + postBody.length);
                isValid = false;
            }

            // Validate folder
            var folders = postFolder.trim().replace(/^\/+|\/+$/g, '').split('/');
            for (var i = 0; i < folders.length; i++) {
                if (folders[i].length > 45) {
                    showError('post_folder', 'Individual folder length must be under 45 characters, currently ' + folders[i].length);
                    isValid = false;
                    break;
                }
            }

            if (isValid) {
                // Show loading spinner and disable submit button
                $loadingSpinner.show();
                $('input[type="submit"]').prop('disabled', true);

                $.ajax({
                    url: $(this).attr('action'),
                    type: 'POST',
                    data: $(this).serialize(),
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    success: function(response) {
                        // Clear the form
                        $('#yourForm')[0].reset();
                        // Clear any remaining error messages
                        clearErrors();
                        // Show success message and close modal
                        showSuccessMessage(response.message);
                        // Set the flag to true
                        linkPostedSuccessfully = true;
                    },
                    error: function(xhr, status, error) {
                        var errors = xhr.responseJSON;
                        for (var field in errors) {
                            showError(field, errors[field]);
                        }
                    },
                    complete: function() {
                        // Hide loading spinner and re-enable submit button
                        $loadingSpinner.hide();
                        $('input[type="submit"]').prop('disabled', false);
                    }
                });
            }
        });

        // Remove is-invalid class when user starts typing
        $('.form-control').on('input', function() {
            $(this).removeClass('is-invalid');
            $(this).next('.invalid-feedback').text('');
        });

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;  
            }
        }

        function showError(fieldId, message) {
            $('#' + fieldId).addClass('is-invalid');
            $('#' + fieldId + '_error').text(message);
        }

        function clearErrors() {
            $('.invalid-feedback').text('');
            $('.form-control').removeClass('is-invalid');
            $('#successMessage').remove();
        }

        function showSuccessMessage(message) {
            // Remove any existing success message
            $('#successMessage').remove();
            
            // Create the success message with a countdown
            var $successMessage = $('<div id="successMessage" class="alert alert-success">' +
                message + '<br>You can continue to add another link below.</div>');
            
            // Insert the message at the top of the modal body
            $('.modal-body').prepend($successMessage);
        }

        // Event listener for modal hide event
        $('#postPopup').on('hidden.bs.modal', function() {
            if (linkPostedSuccessfully) {
                location.reload();
            }
        });
    });
</script>

<style>
    .is-invalid {
        border-color: #dc3545 !important;
        box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25);
    }
    .alert-success {
        color: #155724;
        background-color: #d4edda;
        border-color: #c3e6cb;
        padding: .75rem 1.25rem;
        margin-bottom: 1rem;
        border: 1px solid transparent;
        border-radius: .25rem;
    }

    .spinner-border {
        display: inline-block;
        width: 2rem;
        height: 2rem;
        vertical-align: text-bottom;
        border: 0.25em solid currentColor;
        border-right-color: transparent;
        border-radius: 50%;
        animation: spinner-border .75s linear infinite;
    }

    @keyframes spinner-border {
        to { transform: rotate(360deg); }
    }
</style>
