{% extends "base.html" %}
{% import 'bootstrap/wtf.html' as wtf %}

{% block app_content %}
<link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
<div style="text-align: left;" class="settings_back"> 
    <form method="get" action="{{ url_for('main.user', username=username) }}">
        <button class="btn" type="submit" style="border: 0; background: transparent; padding: 0; cursor: pointer; ">
            <img src="{{ url_for('static', filename='backarrow.png') }}" width="25" height="25" name="back" />
        </button>
    </form>
</div>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Actions</title>
    <style>
        /* Styles for the tabs */
        .tab {
            overflow: hidden;
            border-bottom: 1px solid #ccc; /* Add a black horizontal line under tabs */
        }

        .tab button {
            background-color: #fff;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .tab button:hover {
            background-color: #fff;
            border:#ccc;
        }

        .tab button.active {
            background-color: #fff;
            border: 1px solid #ccc; /* Add border for active tab */
            border-bottom-color: #fff;/* Remove bottom border for active tab */
        }

        /* Styles for the tab content */
        .tabcontent {
            display: none;
            padding: 20px;
            border: 1px solid #fff;
        }
    </style>
</head>
<body>

<div class="tab">
    <button class="static_link" onclick="navigateToSettings()">Settings</button>
    <button class="static_link" onclick="navigateToSharedFolders()">Shared Folders</button>
    <button class="tablinks active" onclick="openTab(event, 'Actions')">Actions</button>
    <button class="static_link" onclick="navigateToLeafs()">Leafs</button>
</div>

<div id="Actions" class="tabcontent" style="display: block;">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Actions</title>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    </head>
    <body>
        <h3>Choose Action</h3>
        <select id="formSelector">
            <option value="rename_folder">Rename Folder</option>
            <option value="copy_folder">Copy Folder</option>
            <option value="move_folder">Move Folder</option>
        </select>
        <br>
        <br>
        <div id="formContainer">
            <!-- Forms will be loaded here dynamically -->
        </div>
    
        <script>
            // When the page loads, show the initial form
            $(document).ready(function () {
                loadForm($('#formSelector').val());
            });
    
            // When the dropdown selection changes, load the corresponding form
            $('#formSelector').change(function () {
                loadForm($(this).val());
            });
    
            // Function to load a form based on the selected option
            function loadForm(selectedForm) {
                $.ajax({
                    url: selectedForm,
                    success: function (data) {
                        $('#formContainer').html(data);
                    }
                });
            }
        </script>
    </body>
</div>



<script>
    function navigateToSettings() {
        var settingsUrl = "{{ url_for('main.settings') }}";
        window.location.href = settingsUrl;
    }

    function navigateToSharedFolders() {
        var url = "{{ url_for('main.shared_folders') }}";
        window.location.href = url;
    }

    function navigateToLeafs() {
        var url = "{{ url_for('main.create_leaf') }}";
        window.location.href = url;
    }
</script>

<script>
    // JavaScript to handle tab switching
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;

        tabcontent = document.getElementsByClassName("tabcontent");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
        }

        tablinks = document.getElementsByClassName("tablinks");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }

        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    // Open the default tab on page load
    document.getElementsByClassName("tablinks")[0].click();
</script>
    
</body>
{% endblock %}
