<link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">

<table class="table table-hover">
    <tr>
        <td width="25px">
            <a href="{{ url_for('main.user', username=follower.username) }}" >
                        <img src="{{  follower.avatar(25)  }}" />
            </a>
        </td>
        <td>
            {% block follower %}
            <a href="{{ url_for('main.user', username=follower.username) }}">
                {{ follower.username }}  {% if follower.verified == True %} <img src="{{ url_for( 'static', filename='green_check16.png') }}"  /> {% endif %}
            </a>
            {% endblock %}
            

        </td>


        
    </tr>
</table>
