{% extends "base.html" %}
{% import 'bootstrap/wtf.html' as wtf %}

{% block app_content %}
<link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
<div style="text-align: left;" class="settings_back"> 
    <form method="get" action="{{ url_for('main.user', username=form.username.data) }}">
        <button class="btn" type="submit" style="border: 0; background: transparent; padding: 0; cursor: pointer; ">
            <img src="{{ url_for('static', filename='backarrow.png') }}" width="25" height="25" name="back" />
        </button>
    </form>
</div>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings</title>
    <style>
        /* Styles for the tabs */
        .tab {
            overflow: hidden;
            border-bottom: 1px solid #ccc; /* Add a black horizontal line under tabs */
        }

        .tab button {
            background-color: #fff;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .tab button:hover {
            background-color: #fff;
            border:#ccc;
        }

        .tab button.active {
            background-color: #fff;
            border: 1px solid #ccc; /* Add border for active tab */
            border-bottom-color: #fff;/* Remove bottom border for active tab */
        }

        /* Styles for the tab content */
        .tabcontent {
            display: none;
            padding: 20px;
            border: 1px solid #fff;
        }
    </style>
</head>
<body>

<div class="tab">
    <button class="tablinks active" onclick="openTab(event, 'Settings')">Settings</button>
    <button class="static_link" onclick="navigateToSharedFolders()">Shared Folders</button>
    <button class="static_link" onclick="navigateToActions()">Actions</button>
    <button class="static_link" onclick="navigateToLeafs()">Leafs</button>


</div>

<div id="Settings" class="tabcontent" style="display: block;">
    <div class="row">
        <div class="col-md-4">
            {{ wtf.quick_form(form, extra_classes='my-form') }}
        </div>
    </div>
    <br>
    <form id="delete-account-form" action="{{ url_for('main.delete_account', user_id=current_user.id) }}" method="post" onsubmit="return false;">
        {{ form.hidden_tag() }}
        <input type="button" value="{{ _('Delete Account') }}" class="btn btn-delete" onclick="showConfirmationPopup()" />
    </form>
    
    <div id="confirmation-popup" class="hidden">
        <div class="popup-content">
            <span class="popup-message">Are you sure you want to delete your account? This action cannot be undone.</span>
            <button class="btn btn-delete" onclick="deleteAccount('{{current_user.id}}')">Yes, Delete Account</button>
            <button class="btn green-button" onclick="hideConfirmationPopup()">Cancel</button>
        </div>
    </div>
</div>



<script>
    function navigateToSharedFolders() {
        var url = "{{ url_for('main.shared_folders') }}";
        window.location.href = url;
    }

    function navigateToActions() {
        var url = "{{ url_for('main.actions') }}";
        window.location.href = url;
    }

    function navigateToLeafs() {
        var url = "{{ url_for('main.create_leaf') }}";
        window.location.href = url;
    }

</script>

<script>
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;

        tabcontent = document.getElementsByClassName("tabcontent");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
        }

        tablinks = document.getElementsByClassName("tablinks");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }

        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    // Open the default tab on page load
    document.getElementsByClassName("tablinks")[0].click();
</script>
    
<script>
    function showConfirmationPopup() {
        const confirmationPopup = document.getElementById('confirmation-popup');
        confirmationPopup.classList.remove('hidden');
    }

    function hideConfirmationPopup() {
        const confirmationPopup = document.getElementById('confirmation-popup');
        confirmationPopup.classList.add('hidden');
    }

    function deleteAccount(user_id) {
        // Handle account deletion logic here
        const url = `/account/delete/${user_id}`;

        fetch(url, {
            method: 'POST',
        })
        .then(response => response.json())
        .then(data => {
            console.log('Response from Flask:', data);
            // Handle the response data here
            // For demonstration purposes, let's just log a message
            console.log('Account deleted.');
            if (data.redirect_url) {
                window.location.href = data.redirect_url;
            }
        })
        .catch(error => {
            console.error('Error:', error);
            // Handle errors here
        });
        
        hideConfirmationPopup();
    }
</script>
</body>
{% endblock %}
