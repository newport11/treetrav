{% extends "base.html" %}
{% import 'bootstrap/wtf.html' as wtf %}

{% block app_content %}
<link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
<div style="text-align: left;" class="settings_back"> 
    <form method="post" action="{{ url_for('main.user', username=form.username.data ) }}">
        <button class="btn" type="submit" style="border: 0; background: transparent; padding: 0; cursor: pointer; ">
            <img src="{{ url_for( 'static', filename='backarrow.png') }}" width="25" height="25" name="back" />
        </button>
    </form>
</div>
    <h1>{{ _('Settings') }}</h1>
    <div class="row">
        <div class="col-md-4">
            {{ wtf.quick_form(form, extra_classes='my-form') }}
        </div>
    </div>
    <br>
    <form id="delete-account-form" action="{{ url_for('main.delete_account', user_id=current_user.id) }}" method="post">
        {{ form.hidden_tag() }}
        <input type="submit" value="{{ _('Delete Account') }}" class="btn btn-delete" onclick="return confirmDelete();" />
    </form>
    <br>

{% endblock %}

<script>
    function confirmDelete() {
        if (confirm("Are you sure you want to delete your account? This action cannot be undone.")) {
            // The user confirmed, proceed with form submission
            return true;
        } else {
            // The user canceled, do not submit the form
            return false;
        }
    }
</script>
