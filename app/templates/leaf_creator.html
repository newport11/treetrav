{% extends "base.html" %}
{% import 'bootstrap/wtf.html' as wtf %}

{% block app_content %}
<link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
<div style="text-align: left;" class="settings_back"> 
    <form method="get" action="{{ url_for('user.user', username=username) }}">
        <button class="btn" type="submit" style="border: 0; background: transparent; padding: 0; cursor: pointer; ">
            <img src="{{ url_for('static', filename='backarrow.png') }}" width="25" height="25" name="back" />
        </button>
    </form>
</div>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leaf Creator</title>
    <style>
        /* Styles for the tabs */
        .tab {
            overflow: hidden;
            border-bottom: 1px solid #ccc; /* Add a black horizontal line under tabs */
        }

        .tab button {
            background-color: #fff;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .tab button:hover {
            background-color: #fff;
            border:#ccc;
        }

        .tab button.active {
            background-color: #fff;
            border: 1px solid #ccc; /* Add border for active tab */
            border-bottom-color: #fff;/* Remove bottom border for active tab */
        }

        /* Styles for the tab content */
        .tabcontent {
            display: none;
            padding: 20px;
            border: 1px solid #fff;
        }

        .leaf-form .form-group .flask-pagedown,
        .leaf-form .form-group .flask-pagedown .flask-pagedown-input,
        .custom-pagedown {
            min-width: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
        }

        /* Hide the default preview */
        .leaf-form .form-group .flask-pagedown-preview {
            display: none;
        }

        /* Style for the custom preview */
        .markdown-preview {
            border: 1px solid #ccc;
            padding: 10px;
            min-height: 200px;
            background-color: #f9f9f9;
            overflow: auto; /* Allow scrolling for long content */
        }

        /* Styles for code blocks */
        .markdown-preview pre {
            background-color: #f0f0f0; /* Light gray background */
            border: 1px solid #ddd; /* Border for the code block */
            padding: 10px; /* Padding inside the code block */
            overflow: auto; /* Allow scrolling for long lines */
            border-radius: 4px; /* Rounded corners */
            white-space: pre-wrap; /* Preserve whitespace and line breaks */
            word-wrap: break-word; /* Break long words to fit */
        }

        .markdown-preview code {
            background-color: #f0f0f0; /* Light gray background for inline code */
            padding: 2px 4px; /* Padding for inline code */
            border-radius: 4px; /* Rounded corners */
        }
    </style>
</head>
<body>

<div class="tab">
    <button class="static_link" onclick="navigateToSettings()">Settings</button>
    <button class="static_link" onclick="navigateToSharedFolders()">Shared Folders</button>
    <button class="static_link" onclick="navigateToActions()">Actions</button>
    <button class="tablinks active" onclick="openTab(event, 'Leafs')">Leafs</button>

</div>


<div id="Leafs" class="tabcontent" style="display: block;">
    <head>
        {{ pagedown.html_head() }}
    </head>
    <div class="row">
        <div class="col-md-6">
            {{ wtf.quick_form(form, extra_classes='leaf-form') }}
        </div>
        <div class="col-md-6">
            <h4 class="preview-label">Markdown Preview</h4>
            <div class="markdown-preview"></div>
        </div>
    </div>
    <body>
        <br>
        <br>
        {{ rendered_content | safe }}
    </body>
</div>




<script>
    function navigateToSettings() {
        var settingsUrl = "{{ url_for('main.settings') }}";
        window.location.href = settingsUrl;
    }

    function navigateToSharedFolders() {
        var url = "{{ url_for('main.shared_folders') }}";
        window.location.href = url;
    }

    function navigateToActions() {
        var url = "{{ url_for('main.actions') }}";
        window.location.href = url;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    // JavaScript to handle tab switching
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;

        tabcontent = document.getElementsByClassName("tabcontent");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
        }

        tablinks = document.getElementsByClassName("tablinks");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }

        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    // Open the default tab on page load
    document.getElementsByClassName("tablinks")[0].click();

    // markdown preview
    document.addEventListener('DOMContentLoaded', function() {
        var input = document.querySelector('.flask-pagedown-input');
        var preview = document.querySelector('.markdown-preview');
        
        if (input && preview) {
            input.addEventListener('input', function() {
                var markdownText = input.value;
                preview.innerHTML = marked.parse(markdownText);
            });
        }
    });
</script>
    
</body>

{% include 'all_rights_reserved.html' %}

{% endblock %}
